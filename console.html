<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>StayBUT 상담 콘솔</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#ffffff; --soft:#fafaf9; --line:#e8e6e1; --line2:#d6d3cd;
    --text:#1a1815; --soft-text:#57534c; --muted:#78736b;
    --ink:#1f1f23; --ink-hover:#161619; --radius:12px;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; background:var(--soft);
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic','Segoe UI',Roboto,sans-serif; color:var(--text); }
  /* 로그인 */
  #login{ height:100dvh; display:flex; align-items:center; justify-content:center; }
  #login .card{ background:#fff; border:1px solid var(--line); border-radius:18px; padding:34px 28px; width:340px; max-width:90%; box-shadow:0 4px 24px rgba(26,24,21,.05); }
  #login .wm img{ height:26px; display:block; margin:0 auto 4px; }
  #login h1{ font-size:19px; margin:6px 0 2px; letter-spacing:-0.01em; }
  #login p{ font-size:12.5px; color:var(--muted); margin:0 0 20px; }
  #login input{ width:100%; border:1px solid var(--line2); border-radius:10px; padding:12px 13px; font-size:14px; margin-bottom:10px; font-family:inherit; background:var(--soft); }
  #login input:focus{ outline:none; border-color:var(--ink); background:#fff; }
  #login button{ width:100%; border:none; background:var(--ink); color:#fff; border-radius:10px; padding:13px; font-size:15px; font-weight:700; cursor:pointer; }
  #login .err{ color:#b85c3f; font-size:12px; min-height:16px; margin-top:6px; }
  /* 콘솔 */
  #app{ display:none; height:100dvh; }
  .top{ background:var(--ink); color:#fff; display:flex; align-items:center; justify-content:space-between; padding:11px 16px; }
  .top .wm{ display:inline-flex; background:#fff; padding:3px 7px; border-radius:6px; }
  .top .wm img{ height:18px; display:block; }
  .top .t{ font-size:15px; font-weight:800; display:flex; align-items:baseline; gap:9px; }
  .top .cnt{ font-size:12px; opacity:.7; font-weight:600; }
  .top button{ background:rgba(255,255,255,.14); color:#fff; border:none; border-radius:8px; padding:7px 11px; font-size:12px; cursor:pointer; }
  .wrap{ display:flex; height:calc(100dvh - 46px); }
  .list{ width:290px; border-right:1px solid var(--line); background:var(--soft); overflow-y:auto; flex-shrink:0; }
  .conv{ padding:12px 14px; border-bottom:1px solid #f0eeea; cursor:pointer; }
  .conv:hover{ background:#f3f0ec; }
  .conv.active{ background:#fff; box-shadow:inset 3px 0 0 var(--ink); }
  .conv .r{ font-size:14.5px; font-weight:800; display:flex; align-items:center; gap:7px; }
  .conv .who{ font-size:11.5px; color:var(--muted); font-weight:500; }
  .conv .last{ font-size:12.5px; color:var(--soft-text); margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .badge{ background:#b85c3f; color:#fff; border-radius:9px; font-size:10px; font-weight:800; padding:1px 7px; }
  .pane{ flex:1; display:flex; flex-direction:column; min-width:0; }
  /* 정보 패널 */
  .info{ padding:13px 16px; border-bottom:1px solid var(--line); background:#fff; }
  .info .l1{ display:flex; align-items:center; justify-content:space-between; }
  .info .room{ font-size:17px; font-weight:800; letter-spacing:-0.01em; }
  .chip{ font-size:11px; font-weight:800; border-radius:7px; padding:3px 9px; color:#fff; }
  .info .meta{ display:flex; flex-wrap:wrap; gap:6px 16px; margin-top:8px; font-size:12.5px; color:var(--text); }
  .info .meta .k{ color:var(--muted); margin-right:3px; }
  .info .status{ margin-top:8px; display:inline-block; font-size:11px; font-weight:800; border-radius:999px; padding:3px 11px; }
  .st-stay{ background:#ecf6e9; color:#3a7030; } .st-in{ background:#e8f0fa; color:#2e5891; }
  .st-out{ background:#fbeae3; color:#9a4a32; } .st-none{ background:#f0eeea; color:var(--muted); }
  .moreBtn,.linkbtn{ background:none; border:none; color:#2e5891; font-size:12px; font-weight:700; cursor:pointer; padding:7px 0 0; }
  .ext{ margin-top:9px; border-top:1px dashed var(--line); padding-top:9px; display:flex; flex-direction:column; gap:6px; font-size:12.5px; }
  .ext .k{ color:var(--muted); margin-right:5px; }
  .ext .visit{ color:#9a4a32; font-weight:700; }
  .ext .reqbody{ background:var(--soft); border:1px solid var(--line); border-radius:8px; padding:7px 9px; margin-top:3px; color:var(--soft-text); white-space:pre-wrap; line-height:1.5; }
  .msgs{ flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:9px; background:var(--soft); }
  .row{ display:flex; } .row.s{ justify-content:flex-end; }
  .b{ max-width:70%; padding:9px 13px; font-size:14.5px; line-height:1.45; border-radius:15px; white-space:pre-wrap; word-break:break-word; }
  .row.g .b{ background:#fff; border:1px solid var(--line); color:var(--text); border-radius:15px 15px 15px 5px; }
  .row.s .b{ background:var(--ink); color:#fff; border-radius:15px 15px 5px 15px; }
  .time{ font-size:10px; color:var(--muted); align-self:flex-end; margin:0 5px; }
  .foot{ display:flex; gap:9px; padding:11px; border-top:1px solid var(--line); background:#fff; }
  .foot textarea{ flex:1; border:1px solid var(--line2); border-radius:11px; padding:11px 13px; font-size:14.5px; resize:none; max-height:120px; outline:none; font-family:inherit; background:var(--soft); }
  .foot textarea:focus{ border-color:var(--ink); background:#fff; }
  .foot button{ border:none; background:var(--ink); color:#fff; border-radius:11px; padding:0 20px; font-weight:700; cursor:pointer; }
  .empty{ flex:1; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:13px; }
  .back{ display:none; }
  @media (max-width:640px){
    .list{ width:100%; } .pane{ display:none; }
    body.chat .list{ display:none; } body.chat .pane{ display:flex; }
    body.chat .back{ display:inline-block; }
  }
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>

const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlqdmZ3YWp0b3RicWZ4cGRsY2FsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0ODE1NDYsImV4cCI6MjA5NDA1NzU0Nn0.39TLrxZyfYthQggvef_RIQQ0YtR2DCu79KmEfEZwGZM';

const _q=new URLSearchParams(location.search);
const DEEP_CONV=_q.get('conv'); const DEEP_ROOM=_q.get('room');
let staffName='상담원', curConv=null, lastTs='1970-01-01T00:00:00Z', seen=new Set(), listTimer=null, msgTimer=null;
function fmtKRW(n){ return (n==null)?'-':'₩'+Number(n).toLocaleString('ko-KR'); }

function esc(t){ return String(t==null?'':t).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function fmt(ts){ const d=new Date(ts); let h=d.getHours(),m=String(d.getMinutes()).padStart(2,'0'); const ap=h<12?'오전':'오후'; h=h%12||12; return `${ap} ${h}:${m}`; }
const DOW=['일','월','화','수','목','금','토'];
function mdow(ds){ if(!ds) return ''; const d=new Date(ds+'T00:00:00'); return `${d.getMonth()+1}/${d.getDate()}(${DOW[d.getDay()]})`; }
function chanChip(name){
  const n=name||''; let c='#78736b', label=name||'직접';
  if(/에어|airbnb/i.test(n)) c='#FF385C'; else if(/부킹|booking/i.test(n)) c='#1B4480'; else if(/아고다|agoda/i.test(n)) c='#6C4BD8';
  else { label='직접'; }
  return `<span class="chip" style="background:${c}">${esc(label)}</span>`;
}
function stayInfo(b){
  if(!b) return {meta:'', status:'<span class="status st-none">연결된 예약 없음</span>', chip:''};
  const ci=b.checkin_date, co=b.checkout_date;
  const nights=Math.max(1,Math.round((new Date(co)-new Date(ci))/86400000));
  const today=new Date(); today.setHours(0,0,0,0);
  const ciD=new Date(ci+'T00:00:00'), coD=new Date(co+'T00:00:00');
  let st='';
  const tstr=today.toISOString().slice(0,10);
  if(ci===tstr) st='<span class="status st-in">오늘 입실</span>';
  else if(co===tstr) st='<span class="status st-out">오늘 퇴실</span>';
  else if(ciD<today && coD>today){ const day=Math.round((today-ciD)/86400000)+1; st=`<span class="status st-stay">● 숙박 중 · ${day}일차</span>`; }
  else if(coD<today) st='<span class="status st-none">지난 예약</span>';
  else st='<span class="status st-in">예정</span>';
  const g=b.num_guests?` · ${b.num_guests}명`:'';
  const meta=`<div><span class="k">숙박</span><b>${mdow(ci)}~${mdow(co)}</b> · ${nights}박${g}</div>`;
  return {meta, status:st, chip:chanChip(b.channels&&b.channels.name)};
}

async function doLogin(){
  const email=$('#email').value.trim(), pw=$('#pw').value; $('#loginErr').textContent='';
  const {error}=await db.auth.signInWithPassword({email,password:pw});
  if(error){ $('#loginErr').textContent='로그인 실패: 이메일/비밀번호를 확인하세요.'; return; }
  start();
}
$('#loginBtn').addEventListener('click',doLogin);
$('#pw').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
$('#logoutBtn').addEventListener('click',async()=>{ await db.auth.signOut(); location.reload(); });
$('#backBtn').addEventListener('click',()=>{ document.body.classList.remove('chat'); curConv=null; if(msgTimer) clearInterval(msgTimer); });

async function start(){
  const {data:{session}}=await db.auth.getSession(); if(!session) return;
  staffName=(session.user.email||'상담원').split('@')[0];
  $('#login').style.display='none'; $('#app').style.display='block';
  await refreshList(); listTimer=setInterval(refreshList,3000);
  if(DEEP_CONV) openConvById(DEEP_CONV);
  else if(DEEP_ROOM) openRoom(DEEP_ROOM);
}
async function openRoom(room){
  const {data}=await db.from('chat_conversations')
    .select('id,room_number,status,last_message,last_sender,last_message_at,unread_staff,booking:bookings(id,checkin_date,checkout_date,num_guests,gross_amount,guest_country,arrival_time_note,notes,raw_note,channel_booking_code,channels(name))')
    .eq('room_number',room).eq('status','open').order('last_message_at',{ascending:false}).limit(1);
  if(data&&data[0]) openConv(data[0]);
}

async function refreshList(){
  const {data,error}=await db.from('chat_conversations')
    .select('id,room_number,status,last_message,last_sender,last_message_at,unread_staff,booking:bookings(id,checkin_date,checkout_date,num_guests,gross_amount,guest_country,arrival_time_note,notes,raw_note,channel_booking_code,channels(name))')
    .eq('status','open').order('last_message_at',{ascending:false}).limit(100);
  if(error||!data) return;
  const tot=data.reduce((s,c)=>s+(c.unread_staff||0),0);
  $('#openCnt').textContent = data.length? `${data.length}${tot?' · 안읽음 '+tot:''}` : '';
  const list=$('#list');
  list.innerHTML = data.length? '' : '<div style="padding:22px;color:#a8a39a;font-size:13px;text-align:center;">열린 대화가 없어요</div>';
  data.forEach(c=>{
    const el=document.createElement('div'); el.className='conv'+(c.id===curConv?' active':'');
    el.innerHTML=`<div class="r">${esc(c.room_number)}호 ${c.unread_staff?`<span class="badge">${c.unread_staff}</span>`:''}</div>
                  <div class="last">${c.last_sender==='staff'?'나: ':''}${esc(c.last_message||'새 대화')}</div>`;
    el.addEventListener('click',()=>openConv(c));
    list.appendChild(el);
  });
}

async function openConv(c){
  curConv=c.id; lastTs='1970-01-01T00:00:00Z'; seen=new Set();
  document.body.classList.add('chat');
  if(msgTimer) clearInterval(msgTimer);
  const si=stayInfo(c.booking); const b=c.booking;
  const req=b&&(b.notes||b.raw_note)?String(b.notes||b.raw_note).slice(0,400):'';
  const ext = b ? `
    <div class="ext" id="ext" style="display:none;">
      ${b.gross_amount!=null?`<div><span class="k">결제금액</span><b>${fmtKRW(b.gross_amount)}</b></div>`:''}
      ${b.guest_country?`<div><span class="k">국적</span><b>${esc(b.guest_country)}</b></div>`:''}
      ${b.arrival_time_note?`<div><span class="k">도착예정</span><b>${esc(b.arrival_time_note)}</b></div>`:''}
      ${b.channel_booking_code?`<div><span class="k">예약코드</span><b>${esc(b.channel_booking_code)}</b></div>`:''}
      ${req?`<div><span class="k">요청사항</span><div class="reqbody">${esc(req)}</div></div>`:''}
      ${b.id?`<div style="margin-top:6px;"><button class="linkbtn" id="bkDetail">예약 상세 보기 ↗</button></div>`:''}
    </div>` : '';
  $('#pane').innerHTML=`
    <div class="info">
      <div class="l1"><div class="room">${esc(c.room_number)}호</div>${si.chip}</div>
      <div class="meta">${si.meta}</div>
      ${si.status}
      ${b?`<button class="moreBtn" id="moreBtn">정보 더보기 ▾</button>`:''}
      ${ext}
    </div>
    <div class="msgs" id="msgs"></div>
    <div class="foot"><textarea id="reply" rows="1" placeholder="답장 입력…"></textarea><button id="sendBtn">전송</button></div>`;
  $('#sendBtn').addEventListener('click',send);
  const moreBtn=$('#moreBtn');
  if(moreBtn) moreBtn.addEventListener('click',()=>{ const e=$('#ext'); const on=e.style.display==='none'; e.style.display=on?'flex':'none'; moreBtn.textContent=on?'정보 접기 ▴':'정보 더보기 ▾'; });
  const bkBtn=$('#bkDetail');
  if(bkBtn&&b&&b.id) bkBtn.addEventListener('click',()=>window.open(ADMIN_URL+'/#booking='+b.id,'_blank'));
  const rep=$('#reply');
  rep.addEventListener('input',()=>{ rep.style.height='auto'; rep.style.height=Math.min(rep.scrollHeight,120)+'px'; });
  rep.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); send(); } });
  await markRead(c.id); await pollMsgs(true);
  msgTimer=setInterval(()=>pollMsgs(false),2500); refreshList();
}
async function markRead(id){ try{ await db.from('chat_conversations').update({unread_staff:0}).eq('id',id); }catch(e){} }
async function loadVisitCount(name){
  try{
    const {count}=await db.from('bookings').select('id',{count:'exact',head:true}).eq('booker_name',name).neq('booking_status','cancelled');
    const el=$('#visit'); if(el&&count&&count>1) el.innerHTML=`<span class="k">방문</span><span class="visit">${count}번째 방문 · 재방문 고객</span>`;
  }catch(e){}
}
async function openConvById(id){
  const {data}=await db.from('chat_conversations')
    .select('id,room_number,status,last_message,last_sender,last_message_at,unread_staff,booking:bookings(id,checkin_date,checkout_date,num_guests,gross_amount,guest_country,arrival_time_note,notes,raw_note,channel_booking_code,channels(name))')
    .eq('id',id).maybeSingle();
  if(data) openConv(data);
}
function addMsg(m){
  if(seen.has(m.id)) return; seen.add(m.id);
  const box=$('#msgs'); if(!box) return;
  const stick=box.scrollHeight-box.scrollTop-box.clientHeight<80;
  const row=document.createElement('div'); row.className='row '+(m.sender==='guest'?'g':'s');
  row.innerHTML = m.sender==='guest'
    ? `<div class="b">${esc(m.body)}</div><span class="time">${fmt(m.created_at)}</span>`
    : `<span class="time">${fmt(m.created_at)}</span><div class="b">${esc(m.body)}</div>`;
  box.appendChild(row); if(m.created_at>lastTs) lastTs=m.created_at; if(stick) box.scrollTop=box.scrollHeight;
}
async function pollMsgs(first){
  if(!curConv) return;
  const {data,error}=await db.from('chat_messages').select('id,sender,body,created_at')
    .eq('conversation_id',curConv).gt('created_at',lastTs).order('created_at',{ascending:true});
  if(error||!data) return;
  const hadGuest=data.some(m=>m.sender==='guest'); data.forEach(addMsg);
  if(first){ const box=$('#msgs'); if(box) box.scrollTop=box.scrollHeight; }
  if(hadGuest) markRead(curConv);
}
async function send(){
  const rep=$('#reply'); if(!rep) return;
  const body=rep.value.trim(); if(!body||!curConv) return;
  const btn=$('#sendBtn'); btn.disabled=true;
  const {error}=await db.from('chat_messages').insert({conversation_id:curConv,sender:'staff',body,staff_name:staffName});
  if(!error){
    await db.from('chat_conversations').update({last_message:body.slice(0,200),last_sender:'staff',last_message_at:new Date().toISOString(),unread_staff:0}).eq('id',curConv);
    rep.value=''; rep.style.height='auto'; await pollMsgs(false); const box=$('#msgs'); if(box) box.scrollTop=box.scrollHeight; refreshList();
  } else alert('전송 실패');
  btn.disabled=false; rep.focus();
}
start();
</script>
