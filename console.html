<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>StayBUT 상담 콘솔</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;800&display=swap" rel="stylesheet" />
<link rel="manifest" href="/manifest.webmanifest" />
<meta name="theme-color" content="#1f1f23" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black" />
<meta name="apple-mobile-web-app-title" content="StayBUT 상담" />
<link rel="apple-touch-icon" href="/apple-180.png" />
<style>
  :root{ --bg:#fff; --soft:#fafaf9; --chat:#f5f4f2; --line:#e8e6e1; --line2:#d6d3cd; --text:#1a1815; --soft-text:#57534c; --muted:#78736b; --ink:#1f1f23; --ink2:#161619; --booking:#1B4480; --danger:#b85c3f; --ok:#3a7030; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; background:var(--soft); font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic','Segoe UI',Roboto,sans-serif; color:var(--text); }
  /* 로그인 */
  #login{ height:100dvh; display:flex; align-items:center; justify-content:center; }
  #login .card{ background:#fff; border:1px solid var(--line); border-radius:18px; padding:34px 28px; width:340px; max-width:90%; box-shadow:0 4px 24px rgba(26,24,21,.05); }
  #login .wm img{ height:26px; display:block; margin:0 auto 4px; }
  #login h1{ font-size:19px; margin:6px 0 2px; text-align:center; }
  #login p{ font-size:12.5px; color:var(--muted); margin:0 0 20px; text-align:center; }
  #login input{ width:100%; border:1px solid var(--line2); border-radius:10px; padding:12px 13px; font-size:14px; margin-bottom:10px; font-family:inherit; background:var(--soft); }
  #login input:focus{ outline:none; border-color:var(--ink); background:#fff; }
  #login button{ width:100%; border:none; background:var(--ink); color:#fff; border-radius:10px; padding:13px; font-size:15px; font-weight:700; cursor:pointer; }
  #login .err{ color:var(--danger); font-size:12px; min-height:16px; margin-top:6px; text-align:center; }
  /* 상단바 */
  #app{ display:none; height:100dvh; flex-direction:column; }
  .top{ background:var(--ink); color:#fff; display:flex; align-items:center; justify-content:space-between; padding:10px 16px; flex-shrink:0; }
  .top .l{ display:flex; align-items:center; gap:10px; }
  .top .wm{ display:inline-flex; background:#fff; padding:3px 7px; border-radius:6px; } .top .wm img{ height:18px; display:block; }
  .top .t{ font-size:15px; font-weight:800; } .top .cnt{ font-size:12px; opacity:.7; font-weight:600; }
  .top button{ background:rgba(255,255,255,.14); color:#fff; border:none; border-radius:8px; padding:7px 11px; font-size:12px; cursor:pointer; margin-left:6px; }
  .top .notif.on{ background:#3a7030; }
  /* 3단 */
  .wrap{ flex:1; display:flex; min-height:0; }
  .list{ width:280px; border-right:1px solid var(--line); background:var(--soft); overflow-y:auto; flex-shrink:0; }
  .conv{ padding:12px 14px; border-bottom:1px solid #f0eeea; cursor:pointer; display:flex; gap:10px; align-items:center; }
  .conv:hover{ background:#f3f0ec; }
  .conv.active{ background:#fff; box-shadow:inset 3px 0 0 var(--ink); }
  .av{ width:38px; height:38px; border-radius:10px; color:#fff; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .conv .cc{ min-width:0; flex:1; }
  .conv .r1{ display:flex; justify-content:space-between; align-items:baseline; }
  .conv .rm{ font-size:14px; font-weight:800; } .conv .tm{ font-size:10px; color:var(--muted); }
  .conv .last{ font-size:12.5px; color:var(--soft-text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
  .badge{ background:var(--danger); color:#fff; border-radius:9px; font-size:10px; font-weight:800; padding:1px 7px; flex-shrink:0; }
  .list-tabs{ position:sticky; top:0; z-index:2; display:flex; gap:6px; padding:9px 10px; background:var(--soft); border-bottom:1px solid var(--line); }
  .list-tabs button{ font-size:12px; font-weight:700; border:1px solid var(--line); background:#fff; color:var(--soft-text); border-radius:999px; padding:5px 12px; cursor:pointer; }
  .list-tabs button.on{ background:var(--ink); color:#fff; border-color:var(--ink); }
  .mchip{ font-size:9.5px; font-weight:800; border-radius:5px; padding:1px 6px; margin-left:5px; vertical-align:middle; }
  .pane{ flex:1; display:flex; flex-direction:column; min-width:0; }
  .pane .hd{ padding:10px 15px; border-bottom:1px solid var(--line); background:#fff; display:flex; align-items:center; gap:10px; flex-shrink:0; }
  .pane .hd .st{ font-size:11px; font-weight:700; }
  .msgs{ flex:1; overflow-y:auto; padding:16px; background:var(--chat); display:flex; flex-direction:column; gap:8px; }
  .daydiv{ align-self:center; background:#e6e3dd; color:var(--muted); font-size:11px; padding:3px 12px; border-radius:999px; margin:4px 0; }
  .m{ display:flex; gap:8px; max-width:76%; }
  .m.s{ align-self:flex-end; flex-direction:row-reverse; }
  .m.g{ align-self:flex-start; }
  .m .mav{ width:26px; height:26px; border-radius:7px; color:#fff; font-size:9px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .bubble{ padding:9px 12px; font-size:14px; line-height:1.45; border-radius:14px; white-space:pre-wrap; word-break:break-word; }
  .m.g .bubble{ background:#fff; border:1px solid var(--line); border-radius:4px 14px 14px 14px; }
  .m.s .bubble{ background:var(--ink); color:#fff; border-radius:14px 4px 14px 14px; }
  .bubble.img{ padding:4px; }
  .bubble.img img{ display:block; max-width:230px; max-height:280px; border-radius:10px; cursor:pointer; }
  .meta{ font-size:10px; color:var(--muted); align-self:flex-end; margin:0 4px; white-space:nowrap; }
  .foot{ border-top:1px solid var(--line); background:#fff; flex-shrink:0; }
  .qr{ display:flex; gap:6px; padding:9px 12px 0; flex-wrap:wrap; }
  .qr .chip{ font-size:11.5px; border:1px solid var(--line); border-radius:999px; padding:5px 11px; color:var(--soft-text); cursor:pointer; background:#fff; }
  .qr .chip:hover{ background:var(--soft); border-color:var(--line2); }
  .composer{ display:flex; align-items:flex-end; gap:9px; padding:10px 12px; }
  .composer .att{ width:40px; height:40px; border-radius:10px; border:1px solid var(--line2); background:#fff; display:flex; align-items:center; justify-content:center; font-size:19px; cursor:pointer; flex-shrink:0; }
  .composer textarea{ flex:1; border:1px solid var(--line2); border-radius:11px; padding:11px 13px; font-size:14.5px; resize:none; max-height:120px; outline:none; font-family:inherit; background:var(--soft); }
  .composer textarea:focus{ border-color:var(--ink); background:#fff; }
  .composer .send{ border:none; background:var(--ink); color:#fff; border-radius:11px; padding:0 20px; height:42px; font-weight:700; cursor:pointer; }
  /* 정보 사이드바 */
  .info{ width:262px; border-left:1px solid var(--line); background:#fff; padding:16px 15px; overflow-y:auto; flex-shrink:0; }
  .info .rm{ font-size:17px; font-weight:800; }
  .chip2{ font-size:10.5px; font-weight:800; border-radius:6px; padding:3px 8px; color:#fff; }
  .info .kv{ font-size:12.5px; line-height:2; margin-top:12px; }
  .info .kv .k{ color:var(--muted); margin-right:5px; }
  .st-stay{ background:#ecf6e9; color:var(--ok);} .st-in{ background:#e8f0fa; color:#2e5891;} .st-out{ background:#fbeae3; color:#9a4a32;} .st-none{ background:#f0eeea; color:var(--muted);}
  .stpill{ display:inline-block; font-size:11px; font-weight:800; border-radius:999px; padding:3px 11px; margin-top:8px; }
  .reqbox{ background:var(--soft); border:1px solid var(--line); border-radius:8px; padding:9px 11px; font-size:11.5px; color:var(--soft-text); line-height:1.5; margin-top:12px; }
  .linkbtn{ display:block; text-align:center; border:1px solid var(--ink); border-radius:9px; padding:9px; font-size:12.5px; font-weight:700; margin-top:14px; cursor:pointer; background:#fff; }
  .empty{ flex:1; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:13px; }
  .backbtn{ display:none; }
  /* 이미지 확대 */
  #lightbox{ display:none; position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:100; align-items:center; justify-content:center; }
  #lightbox img{ max-width:92%; max-height:92%; border-radius:8px; }
  @media (max-width:900px){ .info{ display:none; } }
  @media (max-width:640px){
    .list{ width:100%; } .pane{ display:none; } .info{ display:none; }
    body.chat .list{ display:none; } body.chat .pane{ display:flex; }
    .backbtn{ display:inline-block; }
  }
</style>
</head>
<body>
<div id="login">
  <div class="card">
    <div class="wm"><img id="l-logo" alt="STAYBUT" /></div>
    <h1>상담 콘솔</h1>
    <p>직원 로그인</p>
    <input id="email" type="email" placeholder="이메일" autocomplete="username" />
    <input id="pw" type="password" placeholder="비밀번호" autocomplete="current-password" />
    <button id="loginBtn">로그인</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<div id="app">
  <div class="top">
    <div class="l">
      <button class="backbtn" id="backBtn" title="어드민으로">‹ 어드민</button>
      <span class="wm"><img id="t-logo" alt="STAYBUT" /></span>
      <span class="t">상담 <span class="cnt" id="openCnt"></span></span>
    </div>
    <div>
      <button class="notif" id="notifBtn" title="알림 켜기">🔔 알림</button>
      <button id="logoutBtn">로그아웃</button>
    </div>
  </div>
  <div class="wrap">
    <div class="list" id="list"></div>
    <div class="pane" id="pane"><div class="empty">왼쪽에서 대화를 선택하세요</div></div>
    <div class="info" id="info"></div>
  </div>
</div>
<div id="lightbox"><img id="lightimg" alt="" /></div>
<input type="file" id="fileInput" accept="image/*" style="display:none" />

function esc(t){ return String(t==null?'':t).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function fmt(ts){ const d=new Date(ts); let h=d.getHours(),m=String(d.getMinutes()).padStart(2,'0'); const ap=h<12?'오전':'오후'; h=h%12||12; return `${ap} ${h}:${m}`; }
function fmtList(ts){ const d=new Date(ts), n=new Date(); if(d.toDateString()===n.toDateString()) return fmt(ts); return `${d.getMonth()+1}/${d.getDate()}`; }
function dayLabel(ts){ const d=new Date(ts); const D=['일','월','화','수','목','금','토'][d.getDay()]; return `${d.getFullYear()}. ${d.getMonth()+1}. ${d.getDate()}. (${D})`; }
function fmtKRW(n){ return (n==null)?'-':'₩'+Number(n).toLocaleString('ko-KR'); }
const DOW=['일','월','화','수','목','금','토'];
function mdow(ds){ if(!ds) return ''; const d=new Date(ds+'T00:00:00'); return `${d.getMonth()+1}/${d.getDate()}(${DOW[d.getDay()]})`; }
function avColor(room){ const s=String(room); if(s[0]==='1') return '#1f1f23'; if(s[0]==='2') return '#1B4480'; return '#6C4BD8'; }

async function doLogin(){
  const email=$('#email').value.trim(), pw=$('#pw').value; $('#loginErr').textContent='';
  const {error}=await db.auth.signInWithPassword({email,password:pw});
  if(error){ $('#loginErr').textContent='로그인 실패: 이메일/비밀번호를 확인하세요.'; return; }
  start();
}
$('#loginBtn').addEventListener('click',doLogin);
$('#pw').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
$('#logoutBtn').addEventListener('click',async()=>{ await db.auth.signOut(); location.reload(); });
$('#backBtn').addEventListener('click',()=>{
  // 모바일에서 채팅을 연 상태면 목록으로, 그 외엔 어드민으로
  if(document.body.classList.contains('chat') && window.matchMedia('(max-width:640px)').matches){
    document.body.classList.remove('chat'); curConv=null; if(msgTimer) clearInterval(msgTimer);
  } else {
    location.href = ADMIN_URL + '/';
  }
});

// 알림
$('#notifBtn').addEventListener('click',()=>enablePush(true));
function urlB64(b64){ const pad='='.repeat((4-b64.length%4)%4); const s=(b64+pad).replace(/-/g,'+').replace(/_/g,'/'); const raw=atob(s); const arr=new Uint8Array(raw.length); for(let i=0;i<raw.length;i++) arr[i]=raw.charCodeAt(i); return arr; }
async function enablePush(interactive){
  if(!('Notification' in window)){ if(interactive) alert('이 브라우저는 알림을 지원하지 않아요.'); return; }
  const p = Notification.permission==='granted' ? 'granted' : await Notification.requestPermission();
  notifReady = (p==='granted'); updateNotifBtn();
  if(p!=='granted') return;
  // 백그라운드 웹푸시 구독 (지원 브라우저)
  if(!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  try{
    const reg = await navigator.serviceWorker.register('/sw.js');
    let sub = await reg.pushManager.getSubscription();
    if(!sub) sub = await reg.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey:urlB64(VAPID_PUBLIC) });
    const j = sub.toJSON();
    await db.from('push_subscriptions').upsert({ endpoint:j.endpoint, p256dh:j.keys.p256dh, auth:j.keys.auth, label:staffName }, { onConflict:'endpoint' });
    if(interactive){ const b=$('#notifBtn'); b.textContent='🔔 알림 켜짐'; }
  }catch(e){ if(interactive) alert('백그라운드 푸시 등록 실패(탭 열려있을 때 알림은 동작): '+(e.message||e)); }
}
function updateNotifBtn(){ const b=$('#notifBtn'); if(notifReady){ b.textContent='🔔 알림 켜짐'; b.classList.add('on'); } else { b.textContent='🔔 알림'; b.classList.remove('on'); } }
function beep(){ try{ const a=new (window.AudioContext||window.webkitAudioContext)(); const o=a.createOscillator(),g=a.createGain(); o.connect(g); g.connect(a.destination); o.frequency.value=760; g.gain.value=0.06; o.start(); setTimeout(()=>{o.stop();a.close();},160);}catch(e){} }
function notify(room,text){
  if(notifReady && Notification.permission==='granted'){
    try{ new Notification(`${room}호 새 문의`,{body:text||'사진', tag:'staybut-'+room}); }catch(e){}
  }
  beep();
}

const CONV_SEL='id,room_number,status,last_message,last_sender,last_message_at,unread_staff,guest_last_seen,booking:bookings(id,checkin_date,checkout_date,num_guests,gross_amount,guest_country,arrival_time_note,notes,raw_note,channel_booking_code,channels(name))';

async function start(){
  const {data:{session}}=await db.auth.getSession(); if(!session) return;
  // 상담 허용 목록 확인 — 미허용 계정은 접근 차단
  const {data:allowed}=await db.rpc('is_console_staff');
  if(!allowed){
    await db.auth.signOut();
    if(listTimer) clearInterval(listTimer);
    $('#app').style.display='none'; $('#login').style.display='flex';
    $('#loginErr').textContent='이 계정은 상담 콘솔 접근 권한이 없습니다. 관리자에게 문의하세요.';
    return;
  }
  staffName=(session.user.email||'상담원').split('@')[0];
  $('#login').style.display='none'; $('#app').style.display='flex';
  notifReady = ('Notification' in window && Notification.permission==='granted'); updateNotifBtn();
  if(notifReady) enablePush(false);
  quickReplies = (await db.from('chat_quick_replies').select('label,body').order('sort')).data||[];
  await refreshList(true);
  listTimer=setInterval(()=>refreshList(false),3000);
}

// ===== 목록 =====
let listTab='all';
function miniStatus(b){
  if(!b) return '';
  const ci=b.checkin_date, co=b.checkout_date; if(!ci||!co) return '';
  const t=new Date(); t.setHours(0,0,0,0); const ts=t.toISOString().slice(0,10);
  const ciD=new Date(ci+'T00:00:00'), coD=new Date(co+'T00:00:00');
  if(ci===ts) return '<span class="mchip st-in">오늘 입실</span>';
  if(co===ts) return '<span class="mchip st-out">오늘 퇴실</span>';
  if(ciD<t && coD>t){ const d=Math.round((t-ciD)/86400000)+1; return `<span class="mchip st-stay">숙박중 ${d}일차</span>`; }
  return '';
}
async function refreshList(first){
  const {data,error}=await db.from('chat_conversations').select(CONV_SEL)
    .eq('status','open').order('last_message_at',{ascending:false}).limit(100);
  if(error||!data) return;
  const tot=data.reduce((s,c)=>s+(c.unread_staff||0),0);
  $('#openCnt').textContent = data.length? `${data.length}${tot?' · 안읽음 '+tot:''}` : '';
  // 새 문의 알림 (목록 상 최신 손님 메시지)
  const newest=data.find(c=>c.last_sender==='guest' && c.unread_staff>0);
  if(newest){
    const key=newest.id+'|'+newest.last_message_at;
    if(!first && lastNotifiedMsgId && lastNotifiedMsgId!==key && (!curConv || curConv!==newest.id || document.hidden)){
      notify(newest.room_number, newest.last_message);
    }
    lastNotifiedMsgId=key;
  }
  const list=$('#list');
  const unreadCount=data.filter(c=>c.unread_staff>0).length;
  // 안읽음 먼저, 그다음 최신순
  let rows=data.slice().sort((a,b)=> ((b.unread_staff>0)-(a.unread_staff>0)) || (a.last_message_at<b.last_message_at?1:-1));
  if(listTab==='unread') rows=rows.filter(c=>c.unread_staff>0);
  const tabs=`<div class="list-tabs">
    <button class="${listTab==='all'?'on':''}" data-tab="all">전체 ${data.length}</button>
    <button class="${listTab==='unread'?'on':''}" data-tab="unread">안읽음 ${unreadCount}</button>
  </div>`;
  const items = rows.length ? rows.map(c=>`
    <div class="conv${c.id===curConv?' active':''}" data-id="${c.id}">
      <div class="av" style="background:${avColor(c.room_number)}">${esc(c.room_number)}</div>
      <div class="cc"><div class="r1"><span class="rm">${esc(c.room_number)}호${miniStatus(c.booking)}</span><span class="tm">${fmtList(c.last_message_at)}</span></div>
      <div class="last">${c.last_sender==='staff'?'나: ':''}${esc(c.last_message||'새 대화')}</div></div>
      ${c.unread_staff?`<span class="badge">${c.unread_staff}</span>`:''}
    </div>`).join('')
    : `<div style="padding:22px;color:#a8a39a;font-size:13px;text-align:center;">${listTab==='unread'?'안 읽은 대화가 없어요':'열린 대화가 없어요'}</div>`;
  list.innerHTML=tabs+items;
  list.querySelectorAll('.list-tabs button').forEach(b=>b.addEventListener('click',()=>{ listTab=b.dataset.tab; refreshList(false); }));
  list.querySelectorAll('.conv[data-id]').forEach(el=>el.addEventListener('click',()=>{ const c=data.find(x=>x.id===el.dataset.id); if(c) openConv(c); }));
}

function stayInfo(b){
  if(!b) return {chip:'', pill:'<span class="stpill st-none">연결된 예약 없음</span>', kv:''};
  const ci=b.checkin_date,co=b.checkout_date;
  const nights=Math.max(1,Math.round((new Date(co)-new Date(ci))/86400000));
  const t=new Date(); t.setHours(0,0,0,0); const ts=t.toISOString().slice(0,10);
  const ciD=new Date(ci+'T00:00:00'), coD=new Date(co+'T00:00:00');
  let pill;
  if(ci===ts) pill='<span class="stpill st-in">오늘 입실</span>';
  else if(co===ts) pill='<span class="stpill st-out">오늘 퇴실</span>';
  else if(ciD<t&&coD>t){ const day=Math.round((t-ciD)/86400000)+1; pill=`<span class="stpill st-stay">● 숙박 중 · ${day}일차</span>`; }
  else if(coD<t) pill='<span class="stpill st-none">지난 예약</span>';
  else pill='<span class="stpill st-in">예정</span>';
  const nm=(b.channels&&b.channels.name)||''; let cc='#78736b',lbl='직접';
  if(/에어|airbnb/i.test(nm)){cc='#FF385C';lbl='에어비앤비';} else if(/부킹|booking/i.test(nm)){cc='#1B4480';lbl='부킹닷컴';} else if(/아고다|agoda/i.test(nm)){cc='#6C4BD8';lbl='아고다';}
  const g=b.num_guests?` · ${b.num_guests}명`:'';
  const kv=`<div><span class="k">숙박</span><b>${mdow(ci)}~${mdow(co)} · ${nights}박${g}</b></div>
    ${b.gross_amount!=null?`<div><span class="k">결제금액</span><b>${fmtKRW(b.gross_amount)}</b></div>`:''}
    ${b.guest_country?`<div><span class="k">국적</span><b>${esc(b.guest_country)}</b></div>`:''}
    ${b.arrival_time_note?`<div><span class="k">도착예정</span><b>${esc(b.arrival_time_note)}</b></div>`:''}
    ${b.channel_booking_code?`<div><span class="k">예약코드</span><b>${esc(b.channel_booking_code)}</b></div>`:''}`;
  return {chip:`<span class="chip2" style="background:${cc}">${lbl}</span>`, pill, kv};
}
function renderInfo(c){
  const b=c.booking; const si=stayInfo(b);
  const req=b&&(b.notes||b.raw_note)?String(b.notes||b.raw_note).slice(0,400):'';
  $('#info').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;"><span class="rm">${esc(c.room_number)}호</span>${si.chip}</div>
    ${si.pill}
    <div class="kv">${si.kv}</div>
    ${req?`<div class="reqbox"><b style="color:#78736b;">요청사항</b><br>${esc(req)}</div>`:''}
    ${b&&b.id?`<div class="linkbtn" onclick="window.open('${ADMIN_URL}/#booking=${b.id}','_blank')">예약 상세 보기 ↗</div>`:''}`;
}

// ===== 대화 열기 =====
async function openConv(c){
  curConv=c.id; curRoom=c.room_number; curBooking=c.booking; msgSig='';
  document.body.classList.add('chat');
  if(msgTimer) clearInterval(msgTimer);
  const si=stayInfo(c.booking);
  const qrHtml=quickReplies.map((q,i)=>`<span class="chip" data-i="${i}">${esc(q.label)}</span>`).join('');
  $('#pane').innerHTML=`
    <div class="hd"><div class="av" style="width:34px;height:34px;background:${avColor(c.room_number)}">${esc(c.room_number)}</div>
      <div><div style="font-size:14px;font-weight:800;">${esc(c.room_number)}호</div><div class="st">${si.pill.replace(/class="stpill[^"]*"/,'style="color:#3a7030;font-weight:700"')}</div></div></div>
    <div class="msgs" id="msgs"></div>
    <div class="foot">
      <div class="qr" id="qr">${qrHtml}</div>
      <div class="composer">
        <div class="att" id="attBtn" title="사진 보내기">🖼</div>
        <textarea id="reply" rows="1" placeholder="답장 입력…"></textarea>
        <button class="send" id="sendBtn">전송</button>
      </div>
    </div>`;
  renderInfo(c);
  $('#sendBtn').addEventListener('click',()=>send());
  $('#attBtn').addEventListener('click',()=>{ const fi=$('#fileInput'); fi.value=''; fi.click(); });
  const rep=$('#reply');
  rep.addEventListener('input',()=>{ rep.style.height='auto'; rep.style.height=Math.min(rep.scrollHeight,120)+'px'; });
  rep.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); send(); } });
  $('#qr').querySelectorAll('.chip').forEach(ch=>ch.addEventListener('click',()=>{ const q=quickReplies[+ch.dataset.i]; if(q){ rep.value=q.body; rep.focus(); rep.dispatchEvent(new Event('input')); } }));
  // 드래그&드롭
  const msgsEl=$('#msgs');
  ['dragover','dragenter'].forEach(ev=>msgsEl.addEventListener(ev,e=>{e.preventDefault();}));
  msgsEl.addEventListener('drop',e=>{ e.preventDefault(); const f=e.dataTransfer.files&&e.dataTransfer.files[0]; if(f&&f.type.startsWith('image/')) uploadAndSend(f); });
  await markRead(c.id); await loadMsgs(true);
  msgTimer=setInterval(()=>loadMsgs(false),2500);
  refreshList(false);
}
async function markRead(id){ try{ await db.from('chat_conversations').update({unread_staff:0, staff_last_seen:new Date().toISOString()}).eq('id',id); }catch(e){} }

async function loadMsgs(first){
  if(!curConv) return;
  const [{data:msgs},{data:convs}]=await Promise.all([
    db.from('chat_messages').select('id,sender,body,msg_type,image_path,created_at').eq('conversation_id',curConv).order('created_at'),
    db.from('chat_conversations').select('guest_last_seen').eq('id',curConv).limit(1)
  ]);
  if(!msgs) return;
  curGuestSeen = convs&&convs[0]?convs[0].guest_last_seen:null;
  const sig=msgs.length+'|'+(msgs.length?msgs[msgs.length-1].id:'')+'|'+curGuestSeen;
  if(sig===msgSig && !first) return;
  msgSig=sig;
  renderMsgs(msgs, first);
}
function renderMsgs(msgs, first){
  const box=$('#msgs'); if(!box) return;
  const stick = first || (box.scrollHeight-box.scrollTop-box.clientHeight<120);
  let html=''; let lastDay=''; const seenTs=curGuestSeen?new Date(curGuestSeen).getTime():0;
  msgs.forEach((m,idx)=>{
    const day=dayLabel(m.created_at);
    if(day!==lastDay){ html+=`<div class="daydiv">${day}</div>`; lastDay=day; }
    const isS=m.sender==='staff';
    const isImg=m.msg_type==='image'&&m.image_path;
    const av=isS?`<div class="mav" style="background:#57534c">나</div>`:`<div class="mav" style="background:${avColor(curRoom)}">${esc(curRoom)}</div>`;
    let inner = isImg
      ? `<div class="bubble img"><img data-path="${esc(m.image_path)}" alt="사진" /></div>`
      : `<div class="bubble">${esc(m.body)}</div>`;
    // 읽음: 직원 메시지 & 손님이 그 이후 확인
    let read='';
    if(isS){ const isLastStaff = !msgs.slice(idx+1).some(x=>x.sender==='staff'); if(isLastStaff && seenTs>new Date(m.created_at).getTime()) read='읽음'; }
    const meta=`<span class="meta">${read?read+' · ':''}${fmt(m.created_at)}</span>`;
    html+=`<div class="m ${isS?'s':'g'}">${av}${inner}${meta}</div>`;
  });
  box.innerHTML=html;
  // 이미지: 비공개 버킷 → 서명URL로 로드 (인증된 직원)
  box.querySelectorAll('img[data-path]').forEach(im=>{ const p=im.getAttribute('data-path'); signImg(p).then(u=>{ if(u){ im.src=u; im.onclick=()=>_openImg(u); } }); });
  if(stick) box.scrollTop=box.scrollHeight;
}
const _imgCache={};
async function signImg(path){
  if(_imgCache[path]) return _imgCache[path];
  try{ const {data}=await db.storage.from('chat-images').createSignedUrl(path,3600); if(data&&data.signedUrl){ _imgCache[path]=data.signedUrl; return data.signedUrl; } }catch(e){}
  return null;
}

async function send(){
  const rep=$('#reply'); if(!rep) return;
  const body=rep.value.trim(); if(!body||!curConv) return;
  const btn=$('#sendBtn'); btn.disabled=true;
  const {error}=await db.from('chat_messages').insert({conversation_id:curConv,sender:'staff',body,msg_type:'text',staff_name:staffName});
  if(!error){
    await db.from('chat_conversations').update({last_message:body.slice(0,200), last_sender:'staff', last_message_at:new Date().toISOString(), unread_staff:0, staff_last_seen:new Date().toISOString()}).eq('id',curConv);
    rep.value=''; rep.style.height='auto'; await loadMsgs(false); const box=$('#msgs'); if(box) box.scrollTop=box.scrollHeight; refreshList(false);
  } else alert('전송 실패');
  btn.disabled=false; rep.focus();
}
// 사진 업로드 (직원: 비공개 버킷 직접 업로드 → image_path 메시지)
$('#fileInput').addEventListener('change',e=>{ const f=e.target.files&&e.target.files[0]; if(f) uploadAndSend(f); });
async function uploadAndSend(file){
  if(!curConv) return;
  if(file.size>6*1024*1024){ alert('6MB 이하 이미지만 보낼 수 있어요.'); return; }
  const ct=file.type||'image/jpeg';
  const ext=ct.includes('png')?'png':ct.includes('webp')?'webp':ct.includes('gif')?'gif':'jpg';
  const path=`${curConv}/${(crypto.randomUUID?crypto.randomUUID():Date.now()+'_'+Math.random().toString(36).slice(2))}.${ext}`;
  const {error}=await db.storage.from('chat-images').upload(path,file,{contentType:ct,upsert:false});
  if(error){ alert('사진 업로드 실패: '+error.message); return; }
  const {error:e2}=await db.from('chat_messages').insert({conversation_id:curConv,sender:'staff',msg_type:'image',body:'[사진]',image_path:path,staff_name:staffName});
  if(e2){ alert('전송 실패'); return; }
  await db.from('chat_conversations').update({last_message:'[사진]', last_sender:'staff', last_message_at:new Date().toISOString(), unread_staff:0, staff_last_seen:new Date().toISOString()}).eq('id',curConv);
  await loadMsgs(false); const box=$('#msgs'); if(box) box.scrollTop=box.scrollHeight; refreshList(false);
}

start();
</script>
