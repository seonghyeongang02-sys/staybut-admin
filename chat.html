<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>StayBUT 문의</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{ --bg:#fff; --soft:#fafaf9; --line:#e8e6e1; --line2:#d6d3cd; --text:#1a1815; --soft-text:#57534c; --muted:#78736b; --ink:#1f1f23; --ink-hover:#161619; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; background:var(--soft); font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic','Segoe UI',Roboto,sans-serif; color:var(--text); }
  #app{ display:flex; flex-direction:column; height:100dvh; max-width:520px; margin:0 auto; background:var(--soft); }
  header{ background:var(--ink); color:#fff; padding:calc(15px + env(safe-area-inset-top)) 18px 15px; }
  header .wm{ display:inline-block; background:#fff; padding:4px 8px; border-radius:7px; }
  header .wm img{ height:20px; display:block; }
  header .rm{ font-size:20px; font-weight:800; margin-top:8px; letter-spacing:-0.01em; }
  header .s{ font-size:12px; opacity:.7; margin-top:3px; }
  #msgs{ flex:1; overflow-y:auto; padding:16px 13px; display:flex; flex-direction:column; gap:9px; }
  .row{ display:flex; } .row.g{ justify-content:flex-end; }
  .b{ max-width:78%; padding:10px 13px; font-size:14.5px; line-height:1.45; border-radius:16px; word-break:break-word; white-space:pre-wrap; }
  .row.s .b{ background:#fff; border:1px solid var(--line); border-radius:16px 16px 16px 5px; box-shadow:0 1px 2px rgba(26,24,21,.03); }
  .row.g .b{ background:var(--ink); color:#fff; border-radius:16px 16px 5px 16px; }
  .time{ font-size:10px; color:var(--muted); align-self:flex-end; margin:0 5px; }
  .sys{ align-self:center; background:#efece7; color:var(--soft-text); font-size:12px; padding:7px 14px; border-radius:999px; margin:4px 0; text-align:center; max-width:92%; line-height:1.5; }
  footer{ display:flex; gap:9px; padding:11px 11px calc(11px + env(safe-area-inset-bottom)); background:var(--bg); border-top:1px solid var(--line); }
  #inp{ flex:1; border:1px solid var(--line2); border-radius:22px; padding:12px 15px; font-size:15px; outline:none; resize:none; max-height:120px; font-family:inherit; background:var(--soft); }
  #inp:focus{ border-color:var(--ink); background:#fff; }
  #send{ width:46px; height:46px; flex-shrink:0; border:none; border-radius:50%; background:var(--ink); color:#fff; font-size:18px; cursor:pointer; }
  #send:disabled{ opacity:.35; }
  #consent{ position:fixed; inset:0; background:var(--soft); display:flex; flex-direction:column; justify-content:center; padding:28px 24px calc(28px + env(safe-area-inset-bottom)); max-width:520px; margin:0 auto; }
  #consent .wm{ display:inline-block; background:var(--ink); padding:6px 10px; border-radius:8px; align-self:flex-start; }
  #consent .wm img{ height:22px; display:block; }
  #consent h1{ font-size:21px; margin:18px 0 6px; letter-spacing:-0.01em; }
  #consent p{ font-size:13.5px; color:var(--soft-text); line-height:1.6; margin:0 0 14px; }
  #consent .box{ background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px 16px; font-size:12.5px; color:var(--soft-text); line-height:1.65; margin-bottom:18px; }
  #consent button{ border:none; background:var(--ink); color:#fff; border-radius:12px; padding:15px; font-size:16px; font-weight:700; cursor:pointer; width:100%; }
</style>
</head>
<body>
<div id="consent">
  <span class="wm"><img id="c-logo" alt="STAYBUT" /></span>
  <h1 id="c-room">스테이 벗 문의</h1>
  <p>궁금하신 점을 실시간으로 도와드려요. 시작하기 전 아래 안내를 확인해 주세요.</p>
  <div class="box">
    · 상담 내용은 <b>응대 목적</b>으로만 이용됩니다.<br>
    · 이름·연락처 등 개인정보는 저장하지 않으며, <b>객실 단위</b>로만 대화합니다.<br>
    · 대화 내용은 일정 기간(약 90일) 후 <b>자동 삭제</b>됩니다.<br>
    · 이 대화는 이 기기에서만 열람됩니다.
  </div>
  <button id="agreeBtn">동의하고 문의 시작</button>
</div>

<div id="app" style="display:none;">
  <header>
    <span class="wm"><img id="h-logo" alt="STAYBUT" /></span>
    <div class="rm" id="h-room">스테이 벗</div>
    <div class="s">무엇이든 편하게 물어보세요 · 실시간 응대</div>
  </header>
  <div id="msgs"><div class="sys" id="hint">연결 중…</div></div>
  <footer>
    <textarea id="inp" rows="1" placeholder="메시지 입력…" autocomplete="off"></textarea>
    <button id="send" disabled>➤</button>
  </footer>
</div>

document.getElementById('c-logo').src=LOGO; document.getElementById('h-logo').src=LOGO;

const msgsEl=$('#msgs'), inpEl=$('#inp'), sendEl=$('#send');
function atBottom(){ return msgsEl.scrollHeight-msgsEl.scrollTop-msgsEl.clientHeight<80; }
function scrollDown(){ msgsEl.scrollTop=msgsEl.scrollHeight; }
function addMsg(m){
  if(seen.has(m.id)) return; seen.add(m.id);
  const stick=atBottom();
  const row=document.createElement('div'); row.className='row '+(m.sender==='guest'?'g':'s');
  row.innerHTML = m.sender==='guest'
    ? `<span class="time">${fmt(m.created_at)}</span><div class="b">${esc(m.body)}</div>`
    : `<div class="b">${esc(m.body)}</div><span class="time">${fmt(m.created_at)}</span>`;
  msgsEl.appendChild(row); if(m.created_at>lastTs) lastTs=m.created_at; if(stick) scrollDown();
}
async function poll(){ if(!convId) return;
  try{ const {data,error}=await db.rpc('chat_guest_fetch',{p_conv:convId,p_token:token,p_since:lastTs}); if(!error&&data) data.forEach(addMsg); }catch(e){}
}
async function send(){
  const body=inpEl.value.trim(); if(!body||!convId) return;
  sendEl.disabled=true;
  const {error}=await db.rpc('chat_guest_send',{p_conv:convId,p_token:token,p_body:body});
  if(!error){ inpEl.value=''; inpEl.style.height='auto'; await poll(); scrollDown(); } else { alert('전송 실패, 다시 시도해주세요.'); }
  sendEl.disabled=false; inpEl.focus();
}
inpEl.addEventListener('input',()=>{ inpEl.style.height='auto'; inpEl.style.height=Math.min(inpEl.scrollHeight,120)+'px'; sendEl.disabled=!inpEl.value.trim(); });
inpEl.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); send(); } });
sendEl.addEventListener('click',send);

async function startChat(){
  $('#consent').style.display='none'; $('#app').style.display='flex';
  if(!ROOM){ $('#hint').textContent='잘못된 접속입니다. 객실 QR로 다시 들어와 주세요.'; return; }
  $('#h-room').textContent=ROOM+'호';
  token=getToken();
  try{
    const {data,error}=await db.rpc('chat_open_session',{p_room:ROOM,p_token:token});
    if(error||!data) throw error||new Error('no conv');
    convId=data;
    $('#hint').textContent='안녕하세요! 도움이 필요하시면 편하게 메시지를 남겨 주세요 😊';
    await poll(); pollTimer=setInterval(poll,2500);
    document.addEventListener('visibilitychange',()=>{ if(!document.hidden) poll(); });
  }catch(e){ $('#hint').textContent='연결에 실패했어요. 잠시 후 새로고침 해주세요.'; }
}

(function(){
  if(ROOM) $('#c-room').textContent=ROOM+'호 문의';
  let agreed=false; try{ agreed=localStorage.getItem('staybut_consent')==='1'; }catch(e){}
  if(agreed){ startChat(); return; }
  $('#agreeBtn').addEventListener('click',()=>{ try{ localStorage.setItem('staybut_consent','1'); }catch(e){} startChat(); });
})();
</script>
</body>
</html>
